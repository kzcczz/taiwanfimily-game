<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FEARNOT 拼圖 — TAIWAN FIMILY</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans TC',sans-serif;background:#060D1A;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;user-select:none;}

    nav{width:100%;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(91,155,213,0.15);}
    .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.12em;color:#7BB3D8;}
    .nav-back{font-size:13px;color:rgba(120,160,200,0.6);text-decoration:none;transition:color 0.2s;}
    .nav-back:hover{color:#fff;}

    .container{width:100%;max-width:900px;padding:1.5rem 1rem;display:flex;flex-direction:column;align-items:center;gap:1.25rem;}

    .top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;}

    .title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.08em;color:#F0F4F8;}
    .title span{color:#5B9BD5;}

    .diff-tabs{display:flex;gap:6px;}
    .diff-tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(91,155,213,0.3);background:transparent;color:rgba(120,160,200,0.7);font-family:inherit;transition:all 0.15s;}
    .diff-tab.active{background:#5B9BD5;color:#fff;border-color:#5B9BD5;}
    .diff-tab:hover:not(.active){border-color:#5B9BD5;color:#fff;}

    .stats-row{display:flex;gap:1.25rem;flex-wrap:wrap;align-items:center;}
    .stat{text-align:center;}
    .stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;letter-spacing:0.03em;line-height:1;}
    .stat-val.accent{color:#FFD966;}
    .stat-label{font-size:10px;letter-spacing:0.15em;color:rgba(120,160,200,0.5);}

    .btn{font-family:'Bebas Neue',sans-serif;letter-spacing:0.1em;border:none;border-radius:8px;cursor:pointer;font-size:15px;padding:9px 22px;transition:all 0.15s;}
    .btn-primary{background:#5B9BD5;color:#fff;}
    .btn-primary:hover{background:#4a87c8;transform:translateY(-1px);}
    .btn-outline{background:transparent;color:rgba(120,160,200,0.7);border:1px solid rgba(91,155,213,0.3);}
    .btn-outline:hover{border-color:#5B9BD5;color:#fff;}

    .game-area{display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;}

    .preview-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
    .preview-label{font-size:11px;letter-spacing:0.12em;color:rgba(120,160,200,0.5);}
    .preview-img{border-radius:10px;border:1px solid rgba(91,155,213,0.2);display:block;}

    .board-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
    .board{display:grid;gap:3px;border-radius:12px;overflow:hidden;border:2px solid rgba(91,155,213,0.2);background:rgba(91,155,213,0.08);padding:3px;cursor:pointer;}
    .tile{position:relative;border-radius:6px;overflow:hidden;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;background:#0A1628;}
    .tile:hover{transform:scale(1.03);box-shadow:0 0 12px rgba(91,155,213,0.4);z-index:2;}
    .tile.selected{box-shadow:0 0 0 3px #FFD966,0 0 16px rgba(255,217,102,0.4);transform:scale(1.04);z-index:3;}
    .tile.correct{box-shadow:0 0 0 2px #6BCB77;}
    .tile canvas{display:block;}

    .complete-overlay{position:fixed;inset:0;background:rgba(6,13,26,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px);}
    .complete-overlay.hidden{display:none;}
    .complete-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,80px);color:#FFD966;letter-spacing:0.08em;margin-bottom:0.5rem;text-align:center;}
    .complete-stats{display:flex;gap:2rem;margin:1rem 0 2rem;flex-wrap:wrap;justify-content:center;}
    .complete-stat{text-align:center;}
    .complete-val{font-family:'Bebas Neue',sans-serif;font-size:40px;color:#fff;}
    .complete-label{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.12em;}
    .complete-img{border-radius:12px;margin-bottom:1.5rem;box-shadow:0 0 40px rgba(91,155,213,0.3);}
    .complete-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

    .lb-section{width:100%;max-width:400px;background:rgba(255,255,255,0.04);border:1px solid rgba(91,155,213,0.15);border-radius:14px;padding:1.25rem;}
    .lb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .lb-title{font-size:12px;letter-spacing:0.15em;color:#5B9BD5;font-weight:500;}
    .lb-tabs{display:flex;gap:4px;}
    .lb-tab{padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid rgba(91,155,213,0.2);background:transparent;color:rgba(120,160,200,0.6);font-family:inherit;transition:all 0.12s;}
    .lb-tab.active{background:rgba(91,155,213,0.2);color:#7BB3D8;}
    .lb-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
    .lb-row:last-child{border:none;}
    .lb-rank{width:22px;text-align:center;color:rgba(255,255,255,0.3);font-size:12px;flex-shrink:0;}
    .lb-name{flex:1;color:rgba(255,255,255,0.8);}
    .lb-val{font-family:'Bebas Neue',sans-serif;font-size:17px;color:#fff;letter-spacing:0.03em;}
    .lb-diff{font-size:10px;color:rgba(120,160,200,0.5);margin-left:4px;}
    .lb-me{background:rgba(91,155,213,0.1);border-radius:6px;padding:0 4px;}

    .name-modal{position:fixed;inset:0;background:rgba(6,13,26,0.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:1.5rem;backdrop-filter:blur(8px);}
    .name-modal.hidden{display:none;}
    .name-card{background:#0D1E38;border:1px solid rgba(91,155,213,0.25);border-radius:16px;padding:2rem;width:100%;max-width:360px;}
    .name-card-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.08em;margin-bottom:0.4rem;}
    .name-card-sub{font-size:13px;color:rgba(120,160,200,0.6);margin-bottom:1.25rem;}
    .name-input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(91,155,213,0.25);border-radius:10px;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:10px;}
    .name-input:focus{border-color:#5B9BD5;}
    .name-input::placeholder{color:rgba(255,255,255,0.2);}
    .name-btns{display:flex;gap:8px;}
    .btn-skip{background:transparent;color:rgba(120,160,200,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 18px;font-size:14px;font-family:inherit;cursor:pointer;}

    @media(max-width:600px){
      .preview-wrap{display:none;}
      .game-area{gap:0.75rem;}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">TAIWAN FIMILY</div>
  <a href="index.html" class="nav-back">← 返回</a>
</nav>

<div class="container">

  <div class="top-bar">
    <div class="title">FEARNOT <span>拼圖</span></div>
    <select id="diff-select" onchange="setDiffSelect(this)" style="
      padding:8px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(91,155,213,0.3);
      border-radius:8px;color:#fff;font-size:14px;font-family:inherit;outline:none;cursor:pointer;">
      <option value="5">5×5</option>
      <option value="6">6×6</option>
      <option value="7">7×7</option>
      <option value="8">8×8</option>
      <option value="9">9×9</option>
      <option value="10">10×10</option>
    </select>
  </div>

  <div class="top-bar">
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-time">00:00</div><div class="stat-label">TIME</div></div>
      <div class="stat"><div class="stat-val accent" id="stat-moves">0</div><div class="stat-label">MOVES</div></div>
      <div class="stat"><div class="stat-val" id="stat-left">—</div><div class="stat-label">REMAINING</div></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" onclick="shuffle()">🔀 重新排列</button>
      <button class="btn btn-primary" onclick="startGame()">▶ 開始</button>
    </div>
  </div>

  <div class="game-area">
    <div class="preview-wrap">
      <div class="preview-label">ORIGINAL</div>
      <img id="preview-img" class="preview-img" width="140" height="140">
    </div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="lb-section">
    <div class="lb-header">
      <div class="lb-title">🏆 LEADERBOARD</div>
      <div class="lb-tabs">
        <button class="lb-tab active" onclick="switchLb('time',this)">最快</button>
        <button class="lb-tab" onclick="switchLb('moves',this)">最少步</button>
      </div>
    </div>
    <div id="lb-list"><div style="color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:0.5rem;">載入中…</div></div>
  </div>

</div>

<!-- COMPLETE -->
<div class="complete-overlay hidden" id="complete-overlay">
  <div class="complete-title">🎉 完成！</div>
  <img id="complete-img" class="complete-img" width="200" height="200" style="border-radius:12px;">
  <div class="complete-stats">
    <div class="complete-stat"><div class="complete-val" id="complete-time">—</div><div class="complete-label">TIME</div></div>
    <div class="complete-stat"><div class="complete-val" id="complete-moves">—</div><div class="complete-label">MOVES</div></div>
    <div class="complete-stat"><div class="complete-val" id="complete-diff">—</div><div class="complete-label">DIFFICULTY</div></div>
  </div>
  <div class="complete-btns">
    <button class="btn btn-primary" onclick="showNameModal()">上傳分數</button>
    <button class="btn btn-outline" onclick="restartFromComplete()">再玩一次</button>
  </div>
</div>

<!-- NAME MODAL -->
<div class="name-modal hidden" id="name-modal">
  <div class="name-card">
    <div class="name-card-title">上傳分數</div>
    <div class="name-card-sub">輸入名字加入排行榜</div>
    <input class="name-input" id="player-name" placeholder="你的名字" maxlength="12" onkeydown="if(event.key==='Enter')submitScore()">
    <div class="name-btns">
      <button class="btn-skip" onclick="hideNameModal()">略過</button>
      <button class="btn btn-primary" style="flex:1;" onclick="submitScore()">確認上傳</button>
    </div>
  </div>
</div>

const BOARD_SIZE = 480;
let grid = 5, tileSize = BOARD_SIZE / grid;
let tiles = [], selected = null, moves = 0;
let timerOn = false, startTime = 0, elapsed = 0, timerRaf = null;
let gameStarted = false, completed = false;
let lbMode = 'time';
let finalTime = 0, finalMoves = 0;

const img = new Image();
img.src = IMG_SRC;
img.onload = () => {
  document.getElementById('preview-img').src = IMG_SRC;
  document.getElementById('complete-img').src = IMG_SRC;
  buildBoard();
  loadLB();
};

function setDiffSelect(sel) {
  grid = parseInt(sel.value);
  tileSize = BOARD_SIZE / grid;
  buildBoard();
  resetTimer();
  moves = 0;
  gameStarted = false;
  completed = false;
  updateStats();
}

function setDiff(n) {
  grid = n;
  tileSize = BOARD_SIZE / grid;
  buildBoard();
  resetTimer();
  moves = 0;
  gameStarted = false;
  completed = false;
  updateStats();
}

function buildBoard() {
  tiles = [];
  for(let r=0;r<grid;r++) for(let c=0;c<grid;c++) tiles.push({r,c,origR:r,origC:c});
  shuffle(false);
  renderBoard();
}

function shuffle(resetGame=true) {
  if(resetGame) {
    resetTimer(); moves=0; gameStarted=false; completed=false; selected=null; updateStats();
  }
  // Fisher-Yates
  for(let i=tiles.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [tiles[i],tiles[j]]=[tiles[j],tiles[i]];
  }
  // Ensure not already solved
  if(isSolved()) shuffle(resetGame);
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById('board');
  const ts = Math.min(tileSize, Math.floor((window.innerWidth - 180) / grid));
  board.style.gridTemplateColumns = `repeat(${grid}, ${ts}px)`;
  board.innerHTML = '';

  tiles.forEach((tile, idx) => {
    const div = document.createElement('div');
    div.className = 'tile' + (isTileCorrect(idx) ? ' correct' : '');
    div.style.width = ts + 'px';
    div.style.height = ts + 'px';

    const c = document.createElement('canvas');
    c.width = ts; c.height = ts;
    const cx = c.getContext('2d');
    cx.drawImage(img, tile.origC * tileSize, tile.origR * tileSize, tileSize, tileSize, 0, 0, ts, ts);

    // Add tile number hint
    cx.fillStyle = 'rgba(0,0,0,0.35)';
    cx.fillRect(0, ts-16, 18, 16);
    cx.fillStyle = 'rgba(255,255,255,0.6)';
    cx.font = '9px sans-serif';
    cx.textAlign = 'center';
    cx.fillText(tile.origR*grid+tile.origC+1, 9, ts-4);

    div.appendChild(c);
    div.addEventListener('click', () => handleClick(idx));
    board.appendChild(div);
  });

  updateStats();
}

function handleClick(idx) {
  if(!gameStarted) {
    gameStarted = true;
    startTime = performance.now() - elapsed * 1000;
    startTimer();
  }

  if(selected === null) {
    selected = idx;
    document.querySelectorAll('.tile')[idx].classList.add('selected');
  } else if(selected === idx) {
    selected = null;
    document.querySelectorAll('.tile')[idx].classList.remove('selected');
  } else {
    [tiles[selected], tiles[idx]] = [tiles[idx], tiles[selected]];
    moves++;
    selected = null;
    renderBoard();
    if(isSolved()) {
      stopTimer();
      completed = true;
      finalTime = elapsed;
      finalMoves = moves;
      setTimeout(showComplete, 400);
    }
  }
}

function isTileCorrect(idx) {
  return tiles[idx].origR * grid + tiles[idx].origC === idx;
}

function isSolved() {
  return tiles.every((t,i) => t.origR * grid + t.origC === i);
}

// Timer
function startTimer() {
  timerOn = true;
  function tick() {
    if(!timerOn) return;
    elapsed = (performance.now() - startTime) / 1000;
    updateStats();
    timerRaf = requestAnimationFrame(tick);
  }
  timerRaf = requestAnimationFrame(tick);
}

function stopTimer() {
  timerOn = false;
  if(timerRaf) cancelAnimationFrame(timerRaf);
}

function resetTimer() {
  stopTimer();
  elapsed = 0;
  updateStats();
}

function startGame() {
  shuffle();
}

function updateStats() {
  const s = Math.floor(elapsed), m = Math.floor(s/60);
  document.getElementById('stat-time').textContent = String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  document.getElementById('stat-moves').textContent = moves;
  const wrong = tiles.filter((t,i) => t.origR*grid+t.origC !== i).length;
  document.getElementById('stat-left').textContent = gameStarted ? wrong : '—';
}

function showComplete() {
  const s = Math.floor(finalTime), m = Math.floor(s/60);
  document.getElementById('complete-time').textContent = String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  document.getElementById('complete-moves').textContent = finalMoves;
  document.getElementById('complete-diff').textContent = grid+'×'+grid;
  document.getElementById('complete-overlay').classList.remove('hidden');
}

function restartFromComplete() {
  document.getElementById('complete-overlay').classList.add('hidden');
  shuffle();
}

function showNameModal() {
  document.getElementById('complete-overlay').classList.add('hidden');
  document.getElementById('name-modal').classList.remove('hidden');
  document.getElementById('player-name').focus();
}

function hideNameModal() {
  document.getElementById('name-modal').classList.add('hidden');
  loadLB();
}

// Supabase
async function sbFetch(path, opts={}) {
  const r = await fetch(SUPABASE_URL+path, {...opts, headers: {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',...(opts.headers||{})} });
  try{return await r.json();}catch{return[];}
}

async function submitScore() {
  const name = document.getElementById('player-name').value.trim();
  if(!name) { alert('請輸入名字！'); return; }
  await sbFetch('/rest/v1/puzzle_scores', {
    method: 'POST',
    headers: {'Prefer':'return=minimal'},
    body: JSON.stringify({ name, time_sec: Math.round(finalTime), moves: finalMoves, difficulty: grid+'x'+grid })
  });
  hideNameModal();
  loadLB();
}

let lbModeActive = 'time';
function switchLb(mode, btn) {
  lbModeActive = mode;
  document.querySelectorAll('.lb-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  loadLB();
}

async function loadLB() {
  const order = lbModeActive==='time' ? 'time_sec.asc' : 'moves.asc';
  const data = await sbFetch(`/rest/v1/puzzle_scores?select=name,time_sec,moves,difficulty&order=${order}&limit=10`);
  const el = document.getElementById('lb-list');
  if(!data||!data.length) { el.innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:0.5rem">還沒有記錄</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = data.map((r,i) => {
    const t = r.time_sec, mm=String(Math.floor(t/60)).padStart(2,'0'), ss=String(t%60).padStart(2,'0');
    const val = lbModeActive==='time' ? `${mm}:${ss}` : r.moves+'步';
    return `<div class="lb-row">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div class="lb-name">${r.name}<span class="lb-diff">${r.difficulty}</span></div>
      <div class="lb-val">${val}</div>
    </div>`;
  }).join('');
}
</script>
