<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>踩地雷 — TAIWAN FIMILY</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #5B9BD5;
      --blue-light: rgba(91,155,213,0.15);
      --blue-dark: #1B4F7A;
      --border: rgba(91,155,213,0.2);
      --bg: #060D1A;
      --bg2: #0D1E38;
      --card: rgba(255,255,255,0.05);
      --text: #F0F4F8;
      --muted: #7A9BBF;
      --radius: 10px;
      --cell: 32px;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      background: rgba(6,13,26,0.9);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.12em;
      color: var(--blue);
    }

    .nav-back {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-back:hover { color: var(--text); }

    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    /* HEADER */
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.08em;
      color: var(--blue);
      align-self: flex-start;
    }

    /* SETTINGS */
    .settings-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .setting-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .setting-label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .setting-input {
      width: 60px;
      padding: 6px 10px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      text-align: center;
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .setting-input:focus { border-color: var(--blue); }

    .preset-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 5px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.12s;
    }

    .preset-btn:hover { border-color: var(--blue); color: var(--blue); }
    .preset-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-outline { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }

    /* HUD */
    .hud {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.875rem 1.25rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .hud-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hud-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .hud-val.red { color: #FF6B6B; }
    .hud-val.blue { color: var(--blue); }

    .hud-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      font-weight: 500;
    }

    .face-btn {
      font-size: 28px;
      cursor: pointer;
      background: rgba(91,155,213,0.08);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      line-height: 1;
    }

    .face-btn:hover { border-color: var(--blue); background: var(--blue-light); }

    /* BOARD */
    .board-wrap {
      overflow-x: auto;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .board {
      display: inline-grid;
      gap: 2px;
      background: rgba(91,155,213,0.15);
      border: 2px solid rgba(91,155,213,0.3);
      border-radius: 8px;
      overflow: hidden;
      padding: 2px;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.08s;
      background: #152C54;
      border: none;
      border-radius: 2px;
      user-select: none;
      -webkit-user-select: none;
    }

    .cell:hover:not(.open):not(.flagged) { background: #1A3664; }

    .cell.open {
      background: #0A1628;
      cursor: default;
    }

    .cell.flagged { background: rgba(255,217,102,0.15); }
    .cell.mine-hit { background: rgba(231,76,60,0.2); }
    .cell.mine-shown { background: #0D1E38; }

    /* Number colors */
    .n1 { color: #7BB3D8; }
    .n2 { color: #6BCB77; }
    .n3 { color: #FF6B6B; }
    .n4 { color: #B19CD9; }
    .n5 { color: #FF9A3C; }
    .n6 { color: #5DCEE8; }
    .n7 { color: #F0F4F8; }
    .n8 { color: #7A9BBF; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1.5rem;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: #0D1E38;
      border: 1px solid rgba(91,155,213,0.25);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-icon { font-size: 48px; text-align: center; margin-bottom: 0.75rem; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.06em; text-align: center; margin-bottom: 0.4rem; }
    .modal-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }

    .modal-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .modal-stat { text-align: center; }
    .modal-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; color: #FFD966; }
    .modal-stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

    .name-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .name-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }
    .name-input:focus { border-color: var(--blue); }
    .name-input::placeholder { color: rgba(255,255,255,0.25); }

    .modal-btns { display: flex; gap: 8px; }
    .btn-skip { background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 16px; font-size: 13px; font-family: inherit; cursor: pointer; }

    /* LEADERBOARD */
    .lb-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      width: 100%;
      max-width: 500px;
    }

    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .lb-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--blue);
    }

    .lb-filter {
      display: flex;
      gap: 4px;
    }

    .lb-filter-btn {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.12s;
    }

    .lb-filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(91,155,213,0.1);
      font-size: 13px;
    }

    .lb-row:last-child { border: none; }
    .lb-rank { width: 24px; text-align: center; color: var(--muted); font-size: 12px; flex-shrink: 0; }
    .lb-name { flex: 1; color: var(--text); }
    .lb-time { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: #FFD966; }
    .lb-diff { font-size: 10px; color: var(--muted); margin-left: 4px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">TAIWAN FIMILY</div>
  <a href="index.html" class="nav-back">← 返回</a>
</nav>

<div class="main">
  <div class="page-title">💣 踩地雷</div>

  <!-- SETTINGS -->
  <div class="settings-card">
    <div class="preset-row">
      <button class="preset-btn" onclick="setPreset(9,9,10,this)">初級</button>
      <button class="preset-btn" onclick="setPreset(16,16,40,this)">中級</button>
      <button class="preset-btn" onclick="setPreset(30,16,99,this)">高級</button>
    </div>
    <div style="width:1px;height:28px;background:var(--border);"></div>
    <div class="setting-group">
      <span class="setting-label">欄</span>
      <input class="setting-input" type="number" id="inp-cols" value="9" min="5" max="40">
    </div>
    <div class="setting-group">
      <span class="setting-label">列</span>
      <input class="setting-input" type="number" id="inp-rows" value="9" min="5" max="30">
    </div>
    <div class="setting-group">
      <span class="setting-label">地雷</span>
      <input class="setting-input" type="number" id="inp-mines" value="10" min="1" max="500">
    </div>
    <button class="btn btn-primary" onclick="newGame()">開始</button>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-stat">
      <div class="hud-val red" id="hud-mines">010</div>
      <div class="hud-label">💣 地雷</div>
    </div>
    <button class="face-btn" id="face-btn" onclick="newGame()">🙂</button>
    <div class="hud-stat">
      <div class="hud-val blue" id="hud-timer">000</div>
      <div class="hud-label">⏱ 秒</div>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="lb-card">
    <div class="lb-header">
      <div class="lb-title">🏆 排行榜（最快完成）</div>
      <div class="lb-filter">
        <button class="lb-filter-btn active" onclick="filterLb('all',this)">全部</button>
        <button class="lb-filter-btn" onclick="filterLb('9x9',this)">初級</button>
        <button class="lb-filter-btn" onclick="filterLb('16x16',this)">中級</button>
        <button class="lb-filter-btn" onclick="filterLb('30x16',this)">高級</button>

let COLS = 9, ROWS = 9, MINES = 10;
let board = [], revealed = [], flagged = [], minePos = new Set();
let gameState = 'idle'; // idle, playing, won, lost
let timerVal = 0, timerInt = null;
let firstClick = true;
let finalTime = 0;
let lbFilter = 'all';
let scoreSubmitted = false;

function setPreset(c, r, m, btn) {
  document.getElementById('inp-cols').value = c;
  document.getElementById('inp-rows').value = r;
  document.getElementById('inp-mines').value = m;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  newGame();
}

function newGame() {
  COLS = Math.max(5, Math.min(40, parseInt(document.getElementById('inp-cols').value) || 9));
  ROWS = Math.max(5, Math.min(30, parseInt(document.getElementById('inp-rows').value) || 9));
  MINES = Math.max(1, Math.min(COLS*ROWS-9, parseInt(document.getElementById('inp-mines').value) || 10));

  document.getElementById('inp-cols').value = COLS;
  document.getElementById('inp-rows').value = ROWS;
  document.getElementById('inp-mines').value = MINES;

  gameState = 'idle';
  firstClick = true;
  scoreSubmitted = false;
  board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
  revealed = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
  flagged = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
  minePos = new Set();

  stopTimer(); timerVal = 0;
  updateHUD();
  document.getElementById('face-btn').textContent = '🙂';
  renderBoard();
  hideModal();
}

function placeMines(safeR, safeC) {
  const safe = new Set();
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
    const nr=safeR+dr, nc=safeC+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) safe.add(nr*COLS+nc);
  }
  while(minePos.size < MINES) {
    const pos = Math.floor(Math.random()*ROWS*COLS);
    if(!safe.has(pos)) minePos.add(pos);
  }
  // Calculate numbers
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if(minePos.has(r*COLS+c)) { board[r][c] = -1; continue; }
    let cnt = 0;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
      const nr=r+dr, nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&minePos.has(nr*COLS+nc)) cnt++;
    }
    board[r][c] = cnt;
  }
}

function handleClick(r, c) {
  if(gameState==='won'||gameState==='lost') return;
  if(flagged[r][c]) return;
  if(revealed[r][c]) { chordClick(r,c); return; }

  if(firstClick) {
    firstClick = false;
    gameState = 'playing';
    placeMines(r, c);
    startTimer();
  }

  if(minePos.has(r*COLS+c)) {
    revealed[r][c] = true;
    gameOver(r, c);
    return;
  }

  flood(r, c);
  checkWin();
  renderBoard();
}

function handleRightClick(e, r, c) {
  e.preventDefault();
  if(gameState==='won'||gameState==='lost') return;
  if(revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  updateHUD();
  renderBoard();
}

function chordClick(r, c) {
  if(!revealed[r][c]||board[r][c]<=0) return;
  let flagCount = 0;
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
    const nr=r+dr, nc=c+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&flagged[nr][nc]) flagCount++;
  }
  if(flagCount !== board[r][c]) return;
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
    const nr=r+dr, nc=c+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!flagged[nr][nc]&&!revealed[nr][nc]) {
      if(minePos.has(nr*COLS+nc)) { revealed[nr][nc]=true; gameOver(nr,nc); return; }
      flood(nr, nc);
    }
  }
  checkWin();
  renderBoard();
}

function flood(r, c) {
  if(r<0||r>=ROWS||c<0||c>=COLS) return;
  if(revealed[r][c]||flagged[r][c]) return;
  revealed[r][c] = true;
  if(board[r][c] === 0) {
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) flood(r+dr, c+dc);
  }
}

function gameOver(hitR, hitC) {
  gameState = 'lost';
  stopTimer();
  document.getElementById('face-btn').textContent = '😵';
  // Reveal all mines
  minePos.forEach(pos => {
    const r=Math.floor(pos/COLS), c=pos%COLS;
    revealed[r][c] = true;
  });
  renderBoard();
  setTimeout(() => {
    document.getElementById('modal-icon').textContent = '💥';
    document.getElementById('modal-title').textContent = '踩到了！';
    document.getElementById('modal-sub').textContent = '下次注意！';
    document.getElementById('modal-time').textContent = timerVal;
    document.getElementById('modal-diff').textContent = COLS+'×'+ROWS;
    document.getElementById('name-row').style.display = 'none';
    document.getElementById('modal').classList.remove('hidden');
  }, 600);
}

function checkWin() {
  const total = ROWS*COLS, openCount = revealed.flat().filter(Boolean).length;
  if(openCount === total - MINES) {
    gameState = 'won';
    finalTime = timerVal;
    stopTimer();
    document.getElementById('face-btn').textContent = '😎';
    // Auto-flag remaining
    minePos.forEach(pos => { flagged[Math.floor(pos/COLS)][pos%COLS] = true; });
    updateHUD();
    renderBoard();
    setTimeout(() => {
      document.getElementById('modal-icon').textContent = '🎉';
      document.getElementById('modal-title').textContent = '勝利！';
      document.getElementById('modal-sub').textContent = `完成時間：${finalTime} 秒`;
      document.getElementById('modal-time').textContent = finalTime;
      document.getElementById('modal-diff').textContent = COLS+'×'+ROWS;
      document.getElementById('name-row').style.display = 'flex';
      document.getElementById('modal').classList.remove('hidden');
    }, 400);
  }
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  const cellSize = Math.min(32, Math.floor((window.innerWidth - 32) / COLS));
  document.documentElement.style.setProperty('--cell', cellSize+'px');
  boardEl.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
  boardEl.innerHTML = '';

  const fontSize = Math.max(10, Math.min(14, cellSize - 10));

  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.fontSize = fontSize + 'px';

    if(revealed[r][c]) {
      cell.classList.add('open');
      if(minePos.has(r*COLS+c)) {
        cell.classList.add('is-mine');
        if(gameState==='lost') cell.classList.add('mine-shown');
      } else if(board[r][c] > 0) {
        cell.textContent = board[r][c];
        cell.classList.add('n'+board[r][c]);
      }
    } else if(flagged[r][c]) {
      cell.classList.add('flagged');
      cell.textContent = '🚩';
      cell.style.fontSize = (fontSize+2)+'px';
    }

    cell.addEventListener('click', () => handleClick(r, c));
    cell.addEventListener('contextmenu', e => handleRightClick(e, r, c));
    cell.addEventListener('touchend', e => {
      if(e.timeStamp - (cell._touchStart||0) > 500) { e.preventDefault(); handleRightClick(e, r, c); }
    });
    cell.addEventListener('touchstart', e => { cell._touchStart = e.timeStamp; });

    boardEl.appendChild(cell);
  }
}

function startTimer() {
  timerInt = setInterval(() => {
    timerVal = Math.min(999, timerVal+1);
    updateHUD();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInt);
  timerInt = null;
}

function updateHUD() {
  const remaining = MINES - flagged.flat().filter(Boolean).length;
  document.getElementById('hud-mines').textContent = String(Math.max(-99, remaining)).padStart(3,'0');
  document.getElementById('hud-timer').textContent = String(timerVal).padStart(3,'0');
}

function hideModal() {
  document.getElementById('modal').classList.add('hidden');
}

// Supabase
async function sbFetch(path, opts={}) {
  const r = await fetch(SUPABASE_URL+path, {...opts, headers: {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  try{return await r.json();}catch{return [];}
}

async function submitScore() {
  if(scoreSubmitted) return;
  const name = document.getElementById('player-name').value.trim();
  if(!name) { alert('請輸入名字！'); return; }
  const btn = document.querySelector('#modal .btn-primary');
  btn.textContent = '上傳中…'; btn.disabled = true;
  try {
    const result = await sbFetch('/rest/v1/minesweeper_scores', {
      method: 'POST',
      headers: {'Prefer':'return=minimal'},
      body: JSON.stringify({ name, time_sec: finalTime, cols: COLS, rows: ROWS, mines: MINES, difficulty: COLS+'x'+ROWS })
    });
    if(result && result.code) {
      alert('上傳失敗：' + JSON.stringify(result));
      btn.textContent = '上傳'; btn.disabled = false;
      return;
    }
    scoreSubmitted = true;
    btn.textContent = '✓ 已上傳';
    setTimeout(() => { hideModal(); loadLB(); }, 800);
  } catch(e) {
    alert('錯誤：' + e.message);
    btn.textContent = '上傳'; btn.disabled = false;
  }
}

function filterLb(f, btn) {
  lbFilter = f;
  document.querySelectorAll('.lb-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadLB();
}

async function loadLB() {
  let path = '/rest/v1/minesweeper_scores?select=name,time_sec,difficulty&order=time_sec.asc&limit=10';
  if(lbFilter !== 'all') path += `&difficulty=eq.${lbFilter}`;
  const data = await sbFetch(path);
  const el = document.getElementById('lb-list');
  if(!data||!data.length) { el.innerHTML='<div style="color:#9ca3af;font-size:13px;text-align:center;padding:0.5rem;">還沒有記錄</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = data.map((r,i) => `
    <div class="lb-row">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div class="lb-name">${r.name}<span class="lb-diff">${r.difficulty}</span></div>
      <div class="lb-time">${r.time_sec}s</div>
    </div>`).join('');
}

// Init
newGame();
loadLB();
</script>
