<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遊戲中心 — TAIWAN FIMILY</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #060D1A;
      color: #F0F4F8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* BG */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(91,155,213,0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: relative;
      z-index: 1;
      background: transparent;
      border-bottom: none;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: 'Noto Sans TC', sans-serif; font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.12em;
      color: #7BB3D8;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5B9BD5;
      box-shadow: 0 0 8px rgba(91,155,213,0.8);
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .main {
      position: relative;
      z-index: 1;
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      width: 100%;
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: #5B9BD5;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: rgba(91,155,213,0.5);
    }

    .hero-title {
      font-family: 'Noto Sans TC', sans-serif; font-weight: 900;
      font-size: clamp(40px, 8vw, 72px);
      letter-spacing: 0.06em;
      line-height: 1;
      color: #F0F4F8;
    }

    .hero-title span { color: #5B9BD5; }

    .hero-sub {
      font-size: 14px;
      color: rgba(120,160,200,0.6);
      margin-top: 0.75rem;
    }

    /* GAME CARDS */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .game-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(91,155,213,0.15);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .game-card:hover {
      border-color: rgba(91,155,213,0.4);
      background: rgba(91,155,213,0.06);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .game-card:hover::before { opacity: 1; }

    .game-card.puzzle::before { background: linear-gradient(90deg, #5B9BD5, #7BB3D8); }
    .game-card.mine::before { background: linear-gradient(90deg, #FF6B6B, #FF9A3C); }
    .game-card.coming::before { background: linear-gradient(90deg, #B19CD9, #5B9BD5); }

    .game-icon {
      font-size: 36px;
      line-height: 1;
    }

    .game-name {
      font-family: 'Noto Sans TC', sans-serif; font-weight: 900;
      font-size: 22px;
      letter-spacing: 0.06em;
      color: #F0F4F8;
    }

    .game-desc {
      font-size: 13px;
      color: rgba(120,160,200,0.6);
      line-height: 1.6;
      flex: 1;
    }

    .game-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      align-self: flex-start;
    }

    .tag-blue { background: rgba(91,155,213,0.15); color: #7BB3D8; }
    .tag-red { background: rgba(255,107,107,0.15); color: #FF8A8A; }
    .tag-muted { background: rgba(255,255,255,0.06); color: rgba(120,160,200,0.5); }

    .game-arrow {
      font-size: 18px;
      color: rgba(120,160,200,0.4);
      transition: color 0.2s, transform 0.2s;
      align-self: flex-end;
    }

    .game-card:hover .game-arrow {
      color: #5B9BD5;
      transform: translate(3px, -3px);
    }

    .coming-soon {
      position: absolute;
      top: 14px; right: 14px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(120,160,200,0.4);
      border: 1px solid rgba(120,160,200,0.15);
      border-radius: 20px;
      padding: 2px 8px;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      font-size: 11px;
      color: rgba(120,160,200,0.3);
      letter-spacing: 0.06em;
      border-top: 1px solid rgba(91,155,213,0.08);
    }

    @media (max-width: 480px) {
      .main { padding: 2rem 1rem; }
      .games-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
