<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SPAGHETTI SLASH — TAIWAN FIMILY</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0E1A; color: #fff; font-family: 'Noto Sans TC', sans-serif; touch-action: none; user-select: none; }

    #main-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* All UI on top of canvas */
    #ui { position: absolute; inset: 0; pointer-events: none; }
    #ui .clickable { pointer-events: all; }

    /* SCREENS */
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; background: rgba(10,14,26,0.92); }
    .screen.hidden { display: none !important; }

    .game-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(56px,10vw,110px); letter-spacing: 0.05em; line-height: 0.9; text-align: center; margin-bottom: 0.5rem; }
    .game-title .yellow { color: #FFD966; }
    .game-title .sub { font-size: 0.35em; color: #5B9BD5; display: block; letter-spacing: 0.25em; margin-bottom: 0.25em; }

    .desc { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 2rem; line-height: 1.7; }

    .items-row { display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
    .item-box { text-align: center; }
    .item-box .emoji { font-size: 30px; display: block; }
    .item-box .name { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; margin: 4px 0; }
    .item-box .pts { font-size: 13px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

    .btn { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.12em; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.15s; }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.97); }
    .btn-primary { padding: 14px 48px; background: #FFD966; color: #1a1a1a; font-size: 20px; }
    .btn-secondary { padding: 12px 36px; background: transparent; color: rgba(255,255,255,0.6); font-size: 18px; border: 1px solid rgba(255,255,255,0.2); }
    .btn-secondary:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    /* HUD */
    #hud { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-start; padding: 1rem 1.5rem; pointer-events: none; }
    .hud-block { text-align: center; }
    .hud-label { font-size: 10px; letter-spacing: 0.15em; color: rgba(255,255,255,0.35); }
    .hud-val { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; letter-spacing: 0.03em; }
    .hud-val.urgent { color: #FF6B6B; animation: blink 0.5s ease-in-out infinite; }
    .hud-combo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #FFD966; letter-spacing: 0.05em; min-height: 28px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* GAMEOVER */
    .go-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px,8vw,80px); color: #FF6B6B; letter-spacing: 0.08em; }
    .go-score { font-family: 'Bebas Neue', sans-serif; font-size: clamp(60px,10vw,100px); letter-spacing: 0.05em; line-height: 1; }
    .go-label { font-size: 11px; letter-spacing: 0.2em; color: rgba(255,255,255,0.35); margin-bottom: 1.5rem; }
    .stats-row { display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .stat { text-align: center; }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #FFD966; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.35); }

    .lb { width: 100%; max-width: 340px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 1rem; margin-bottom: 1.25rem; max-height: 180px; overflow-y: auto; }
    .lb-title { font-size: 10px; letter-spacing: 0.2em; color: #5B9BD5; margin-bottom: 0.75rem; }
    .lb-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
    .lb-row:last-child { border: none; }
    .lb-rank { width: 22px; text-align: center; color: rgba(255,255,255,0.35); flex-shrink: 0; }
    .lb-name { flex: 1; }
    .lb-pts { font-family: 'Bebas Neue', sans-serif; font-size: 18px; }
    .lb-me { background: rgba(91,155,213,0.12); border-radius: 6px; padding: 0 4px; }

    .name-row { display: flex; gap: 8px; width: 100%; max-width: 340px; margin-bottom: 1rem; }
    .name-input { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 14px; font-family: inherit; outline: none; }
    .name-input:focus { border-color: #5B9BD5; }
    .name-input::placeholder { color: rgba(255,255,255,0.2); }
    .btn-upload { padding: 10px 18px; background: #5B9BD5; color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .btn-upload:hover { background: #4a87c8; }

    /* COUNTDOWN */
    #countdown { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(10,14,26,0.85); }
    #countdown.hidden { display: none; }
    .cd-num { font-family: 'Bebas Neue', sans-serif; font-size: 200px; color: #fff; animation: cdPop 0.85s ease forwards; }
    @keyframes cdPop { 0%{transform:scale(1.6);opacity:0} 25%{transform:scale(1);opacity:1} 70%{transform:scale(1);opacity:1} 100%{transform:scale(0.7);opacity:0} }

    /* SCORE POP */
    .pop { position: absolute; font-family: 'Bebas Neue', sans-serif; font-size: 26px; pointer-events: none; animation: popAnim 0.75s ease forwards; z-index: 99; }
    @keyframes popAnim { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-55px) scale(1.3)} }

    /* COMBO FLASH */
    #combo-flash { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: #FFD966; pointer-events: none; opacity: 0; letter-spacing: 0.1em; text-shadow: 0 0 30px rgba(255,217,102,0.6); }
  </style>
</head>
<body>

<canvas id="main-canvas"></canvas>

<div id="ui">

  <!-- HUD (hidden initially) -->
  <div id="hud" class="hidden">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="hud-score">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-combo" id="hud-combo"></div>
      <div style="display:flex;gap:6px;justify-content:center;font-size:22px;" id="hud-lives">❤️❤️❤️</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">TIME</div>
      <div class="hud-val" id="hud-timer">60</div>
    </div>
  </div>

  <div id="combo-flash"></div>

  <!-- START SCREEN -->
  <div class="screen clickable" id="screen-start">
    <div class="game-title">
      <span class="sub">TAIWAN FIMILY</span>
      SPAGHETTI<br><span class="yellow">SLASH</span>
    </div>
    <div class="desc">滑過食材得分，小心別切到炸彈！</div>
    <div class="items-row">
      <div class="item-box"><span class="emoji">🍝</span><div class="name">PASTA</div><div class="pts" style="background:rgba(255,217,102,0.15);color:#FFD966;">+10</div></div>
      <div class="item-box"><span class="emoji">🦐</span><div class="name">SHRIMP</div><div class="pts" style="background:rgba(255,154,60,0.15);color:#FF9A3C;">+20</div></div>
      <div class="item-box"><span class="emoji">🍅</span><div class="name">TOMATO</div><div class="pts" style="background:rgba(107,203,119,0.15);color:#6BCB77;">+15</div></div>
      <div class="item-box"><span class="emoji">💣</span><div class="name">BOMB</div><div class="pts" style="background:rgba(255,107,107,0.15);color:#FF6B6B;">-1❤️</div></div>
    </div>
    <button class="btn btn-primary" onclick="startCountdown()">開始遊戲</button>
  </div>

  <!-- GAMEOVER SCREEN -->
  <div class="screen clickable hidden" id="screen-gameover">
    <div class="go-title">GAME OVER</div>
    <div class="go-score" id="go-score">0</div>
    <div class="go-label">POINTS</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="go-cut">0</div><div class="stat-label">切斷</div></div>
      <div class="stat"><div class="stat-val" id="go-combo">0</div><div class="stat-label">最高連擊</div></div>
      <div class="stat"><div class="stat-val" id="go-miss">0</div><div class="stat-label">Miss</div></div>
    </div>
    <div class="name-row">
      <input class="name-input" id="player-name" placeholder="輸入名字上傳分數" maxlength="12">
      <button class="btn-upload" onclick="submitScore()">上傳</button>
    </div>
    <div class="lb">
      <div class="lb-title">🏆 LEADERBOARD</div>
      <div id="lb-list"><div style="color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:0.5rem;">載入中…</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startCountdown()">再玩一次</button>
      <button class="btn btn-secondary" onclick="showStart()">回首頁</button>
    </div>
  </div>

  <!-- COUNTDOWN -->
  <div id="countdown" class="hidden clickable"></div>

</div>

<script>
const SUPABASE_URL = 'https://gexcoudliocybhmlziss.supabase.co';
const SUPABASE_KEY = 'sb_publishable__XRn__8TPSQdQYJxmCDl2g_JukRY7DE';

const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let running = false, score = 0, lives = 3, timeLeft = 60;
let combo = 0, maxCombo = 0, totalCut = 0, totalMiss = 0;
let items = [], parts = [], slashPts = [], slashing = false;
let spawnT = 0, spawnInterval = 80, lastT = 0, timerInt = null;
let submitted = false;

const TYPES = [
  {e:'🍝',pts:10,sz:64,w:5,col:'#FFD966'},
  {e:'🍝',pts:10,sz:64,w:4,col:'#FFD966'},
  {e:'🦐',pts:20,sz:58,w:2,col:'#FF9A3C'},
  {e:'🍅',pts:15,sz:58,w:3,col:'#FF6B6B'},
  {e:'💣',pts:0, sz:62,w:2,col:'#888',bomb:true},
];

// Stars bg
const stars = Array.from({length:50},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,a:Math.random(),spd:Math.random()*0.004+0.002}));

function drawBg() {
  ctx.fillStyle = '#0A0E1A';
  ctx.fillRect(0,0,W,H);
  stars.forEach(s => {
    s.a += s.spd;
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(91,155,213,${(Math.sin(s.a)+1)/2*0.5+0.05})`;
    ctx.fill();
  });
}

function spawn() {
  const total = TYPES.reduce((s,t)=>s+t.w,0);
  let r = Math.random()*total, type = TYPES[0];
  for(const t of TYPES){r-=t.w; if(r<=0){type=t;break;}}
  items.push({
    ...type,
    x: type.sz + Math.random()*(W-type.sz*2),
    y: H+type.sz,
    vx: (Math.random()-0.5)*4,
    vy: -(Math.random()*8+11),
    angle: 0,
    spin: (Math.random()-0.5)*0.09,
    alive: true, sliced: false
  });
}

function spawnParts(x,y,col,n=8) {
  for(let i=0;i<n;i++){
    const a = Math.PI*2/n*i+Math.random()*0.5, spd = Math.random()*5+2;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,col,sz:Math.random()*5+2,life:1,decay:Math.random()*0.03+0.02});
  }
}

function showPop(x,y,text,col) {
  const d = document.createElement('div');
  d.className = 'pop';
  d.textContent = text;
  d.style.left = x+'px';
  d.style.top = y+'px';
  d.style.color = col;
  document.getElementById('ui').appendChild(d);
  setTimeout(()=>d.remove(),750);
}

function flashCombo(text) {
  const el = document.getElementById('combo-flash');
  el.textContent = text;
  el.style.animation = 'none';
  el.style.opacity = '1';
  requestAnimationFrame(()=>{
    el.style.animation = 'popAnim 0.9s ease forwards';
  });
}

function checkSlash(x1,y1,x2,y2) {
  items.forEach(item => {
    if(!item.alive||item.sliced) return;
    const dx=x2-x1,dy=y2-y1,fx=item.x-x1,fy=item.y-y1;
    const t=Math.max(0,Math.min(1,(fx*dx+fy*dy)/(dx*dx+dy*dy)));
    if(Math.hypot(x1+t*dx-item.x, y1+t*dy-item.y) < item.sz*0.55) {
      item.sliced=item.alive=false;
      if(item.bomb) {
        lives--;
        combo=0;
        spawnParts(item.x,item.y,'#888',10);
        showPop(item.x,item.y-20,'💥','#FF6B6B');
        updateHUD();
        if(lives<=0) endGame();
      } else {
        const mul = combo>=5?3:combo>=3?2:1;
        const pts = item.pts*mul;
        score+=pts; combo++; totalCut++;
        if(combo>maxCombo) maxCombo=combo;
        if(combo===3) flashCombo('COMBO!');
        else if(combo===5) flashCombo('SUPER!');
        else if(combo>=8) flashCombo('FEVER!!');
        spawnParts(item.x,item.y,item.col,10);
        showPop(item.x,item.y-20, mul>1?`+${pts} ×${mul}`:`+${pts}`, item.col);
        updateHUD();
      }
    }
  });
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score.toLocaleString();
  document.getElementById('hud-timer').textContent = timeLeft;
  document.getElementById('hud-timer').className = 'hud-val'+(timeLeft<=10?' urgent':'');
  document.getElementById('hud-lives').textContent = '❤️'.repeat(Math.max(0,lives));
  document.getElementById('hud-combo').textContent = combo>=3 ? combo+'x COMBO' : '';
}

function gameLoop(ts) {
  if(!running) return;
  const dt = ts-lastT; lastT=ts;
  drawBg();

  // Trail
  if(slashPts.length>1) {
    for(let i=1;i<slashPts.length;i++) {
      const t=i/slashPts.length;
      ctx.beginPath();
      ctx.moveTo(slashPts[i-1].x,slashPts[i-1].y);
      ctx.lineTo(slashPts[i].x,slashPts[i].y);
      ctx.strokeStyle=`rgba(255,255,255,${t*0.85})`;
      ctx.lineWidth=t*7;
      ctx.lineCap='round';
      ctx.stroke();
    }
    slashPts=slashPts.slice(-14);
  }

  // Spawn
  spawnT+=dt;
  if(spawnT>spawnInterval){spawnT=0;spawnInterval=Math.max(38,80-(60-timeLeft)*0.6);if(Math.random()>0.25)spawn();}

  // Items
  items=items.filter(i=>i.y<H+i.sz*2);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  items.forEach(item=>{
    if(!item.alive) return;
    item.vy+=0.38; item.x+=item.vx; item.y+=item.vy; item.angle+=item.spin;
    if(item.y>H+item.sz&&!item.sliced){if(!item.bomb){totalMiss++;combo=0;updateHUD();}item.alive=false;}
    ctx.save();
    ctx.translate(item.x,item.y);
    ctx.rotate(item.angle);
    ctx.font=`${Math.round(item.sz*1.5)}px serif`;
    ctx.fillText(item.e,0,0);
    ctx.restore();
  });

  // Particles
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0');
    ctx.fill();
  });

  requestAnimationFrame(gameLoop);
}

// Input
function pos(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}

canvas.addEventListener('mousedown',e=>{if(!running)return;slashing=true;slashPts=[pos(e)];});
canvas.addEventListener('mousemove',e=>{
  if(!running||!slashing)return;
  const p=pos(e),prev=slashPts[slashPts.length-1];
  if(prev)checkSlash(prev.x,prev.y,p.x,p.y);
  slashPts.push(p);
});
canvas.addEventListener('mouseup',()=>{slashing=false;setTimeout(()=>slashPts=[],100);});
canvas.addEventListener('touchstart',e=>{if(!running)return;e.preventDefault();slashing=true;slashPts=[pos(e)];},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!running||!slashing)return;e.preventDefault();
  const p=pos(e),prev=slashPts[slashPts.length-1];
  if(prev)checkSlash(prev.x,prev.y,p.x,p.y);
  slashPts.push(p);
},{passive:false});
canvas.addEventListener('touchend',()=>{slashing=false;setTimeout(()=>slashPts=[],100);});

// Screens
function showStart(){
  document.getElementById('screen-start').classList.remove('hidden');
  document.getElementById('screen-gameover').classList.add('hidden');
}

function startCountdown(){
  document.getElementById('screen-start').classList.add('hidden');
  document.getElementById('screen-gameover').classList.add('hidden');
  const cd=document.getElementById('countdown');
  cd.classList.remove('hidden');
  let n=3;
  function tick(){
    cd.innerHTML=`<div class="cd-num">${n===0?'GO!':n}</div>`;
    if(n===0){setTimeout(()=>{cd.classList.add('hidden');startGame();},600);}
    else{n--;setTimeout(tick,900);}
  }
  tick();
}

function startGame(){
  score=0;lives=3;timeLeft=60;combo=0;maxCombo=0;totalCut=0;totalMiss=0;
  items=[];parts=[];slashPts=[];submitted=false;running=true;
  spawnT=0;spawnInterval=80;
  document.getElementById('hud').classList.remove('hidden');
  updateHUD();
  timerInt=setInterval(()=>{timeLeft--;updateHUD();if(timeLeft<=0)endGame();},1000);
  lastT=performance.now();
  requestAnimationFrame(gameLoop);
}

function endGame(){
  running=false;clearInterval(timerInt);
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('go-score').textContent=score.toLocaleString();
  document.getElementById('go-cut').textContent=totalCut;
  document.getElementById('go-combo').textContent=maxCombo;
  document.getElementById('go-miss').textContent=totalMiss;
  document.getElementById('screen-gameover').classList.remove('hidden');
  loadLB();
}

// Supabase
async function sbFetch(path,opts={}){
  const r=await fetch(SUPABASE_URL+path,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  try{return await r.json();}catch{return[];}
}

async function submitScore(){
  if(submitted)return;
  const name=document.getElementById('player-name').value.trim();
  if(!name){alert('請輸入名字！');return;}
  const btn=document.querySelector('.btn-upload');
  btn.disabled=true;btn.textContent='上傳中…';
  await sbFetch('/rest/v1/game_scores',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify({name,score,max_combo:maxCombo,total_cut:totalCut})});
  submitted=true;btn.textContent='✓ 已上傳';
  loadLB(name);
}

async function loadLB(myName=null){
  const data=await sbFetch('/rest/v1/game_scores?select=name,score&order=score.desc&limit=10');
  const el=document.getElementById('lb-list');
  if(!data||!data.length){el.innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:0.5rem">還沒有人上傳分數</div>';return;}
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=data.map((r,i)=>`
    <div class="lb-row ${myName&&r.name===myName?'lb-me':''}">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div class="lb-name">${r.name}</div>
      <div class="lb-pts">${r.score.toLocaleString()}</div>
    </div>`).join('');
}

// BG always loops; game loop takes over rendering when running
function bgLoop(){if(!running){drawBg();}requestAnimationFrame(bgLoop);}
bgLoop();
</script>
</body>
</html>
